<!DOCTYPE html>

<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pistelaskuri</title>
  
  <!-- Ladataan FC Kasiysin virallinen fontti (Bebas Neue) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <!-- Ladataan Tailwind CSS tyylejä varten -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Määritetään Tailwindin asetuksiin FC Kasiysin viralliset värit ja fontti -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            kasiysi: {
              red: '#ee383c',
              green: '#01a650',
            }
          },
          fontFamily: {
            bebas: ['"Bebas Neue"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Ladataan React ja ReactDOM CDN:stä -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Ladataan Babel, jotta Reactin JSX-koodi toimii suoraan selaimessa -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Piilotetaan vierityspalkit, mutta pidetään toiminnallisuus */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // Copyright © 2026 Aleksi Hautojärvi
    const { useState, useMemo, useRef, useLayoutEffect, useEffect } = React;

    const DEFAULT_PLAYERS = "Puujalka Pentti, Huti Harri, Paitsio Pekka, Kärkkäri Kalle, Tolppa Timo, Länki Lenni, Filmi Frans";
    const LOGO = "https://www.fckasiysiespoo.fi/@Bin/770312/FC89_logo.png";
    const APP_VERSION = "0.8.9";

    // Custom hook tietojen automaattiseen tallennukseen selaimen muistiin
    function useLocalStorage(key, initialValue) {
      const [value, setValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.warn("Virhe localStorage-luvussa", error);
          return initialValue;
        }
      });

      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (error) {
          console.warn("Virhe localStorage-tallennuksessa", error);
        }
      }, [key, value]);

      return [value, setValue];
    }

    // Yksinkertaiset SVG-ikonit, jotka eivät vaadi erillisiä asennuksia
    const Icon = ({ name, size = 24, className = "" }) => {
      const paths = {
        Plus: <path d="M5 12h14m-7-7v14" />,
        Minus: <path d="M5 12h14" />,
        Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
        Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        Eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
        X: <path d="M18 6L6 18M6 6l12 12" />,
        PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M8 12h8m-4-4v8"/></>,
        BarChart3: <><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>,
        Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
        Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        ArrowDownWideNarrow: <><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="M11 4h10"/><path d="M11 8h7"/><path d="M11 12h4"/></>,
        Filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>,
        Info: <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>,
        Edit: <><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>,
        Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        MessageSquare: <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>
      };

      return (
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          width={size} 
          height={size} 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2" 
          strokeLinecap="round" 
          strokeLinejoin="round" 
          className={className}
        >
          {paths[name]}
        </svg>
      );
    };

    // Apufunktio turvallisen ID:n generointiin paikallisissa tiedostoissa
    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

    // Animointi-hook sijoituksen muutoksille (Uusi, robusti FLIP-toteutus)
    function useFlipAnimation(items) {
      const containerRef = useRef(null);
      const previousPositions = useRef({});

      const prepareAnimation = () => {
        if (!containerRef.current) return;
        const currentPositions = {};
        Array.from(containerRef.current.children).forEach(child => {
          const id = child.dataset.id;
          if (id) {
            const rect = child.getBoundingClientRect();
            currentPositions[id] = { top: rect.top, left: rect.left };
          }
        });
        previousPositions.current = currentPositions;
      };

      useLayoutEffect(() => {
        if (!containerRef.current) return;
        const children = Array.from(containerRef.current.children);
        const currentPositions = {};

        children.forEach(child => {
          const id = child.dataset.id;
          if (id) {
            const rect = child.getBoundingClientRect();
            currentPositions[id] = { top: rect.top, left: rect.left };
          }
        });

        children.forEach(child => {
          const id = child.dataset.id;
          const prev = previousPositions.current[id];
          const curr = currentPositions[id];

          if (prev && curr) {
            const deltaY = prev.top - curr.top;
            const deltaX = prev.left - curr.left;

            if (Math.abs(deltaX) > 1 || Math.abs(deltaY) > 1) {
              child.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
              child.style.transition = 'none';
              child.style.zIndex = '10';

              void child.offsetHeight;

              requestAnimationFrame(() => {
                child.style.transform = '';
                child.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                
                setTimeout(() => {
                  child.style.zIndex = '';
                }, 400);
              });
            }
          }
        });

        previousPositions.current = {};
      }, [items]);

      return { containerRef, prepareAnimation };
    }

    function App() {
      const [rawInput, setRawInput] = useLocalStorage("pl_rawInput", "");
      const [rawCategories, setRawCategories] = useLocalStorage("pl_rawCats", ""); 
      const [players, setPlayers] = useLocalStorage("pl_players", []);
      const [categories, setCategories] = useLocalStorage("pl_cats", []);
      const [matches, setMatches] = useLocalStorage("pl_matches", [{ id: 1, name: "Ottelu 1", scores: {}, comments: "" }]);
      const [activeMatchId, setActiveMatchId] = useLocalStorage("pl_activeMatchId", 1);
      const [sortBy, setSortBy] = useLocalStorage("pl_sortBy", 'total'); 
      
      const [isSummaryOpen, setIsSummaryOpen] = useState(false);
      const [summaryTab, setSummaryTab] = useState('all'); 
      const [editModal, setEditModal] = useState({ isOpen: false, playerId: null, scores: {}, playerComment: "" });
      const [isResetModalOpen, setIsResetModalOpen] = useState(false);
      const [isHelpModalOpen, setIsHelpModalOpen] = useState(false);
      const [hideZeroScores, setHideZeroScores] = useState(false);
      const [logoError, setLogoError] = useState(false);
      const [matchModal, setMatchModal] = useState({ isOpen: false, matchId: null, name: "", comments: "" });

      const catColors = [
        { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-700', btn: 'text-orange-600', hover: 'hover:bg-orange-100' },
        { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', btn: 'text-blue-600', hover: 'hover:bg-blue-100' },
        { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-700', btn: 'text-emerald-600', hover: 'hover:bg-emerald-100' },
        { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700', btn: 'text-purple-600', hover: 'hover:bg-purple-100' },
        { bg: 'bg-pink-50', border: 'border-pink-200', text: 'text-pink-700', btn: 'text-pink-600', hover: 'hover:bg-pink-100' },
      ];

      const handleStart = () => {
        const inputToUse = rawInput.trim() ? rawInput : DEFAULT_PLAYERS;
        const catsToUse = rawCategories.trim() ? rawCategories : "Ryöstö, Syöttö, Maali";
        const parsedCats = catsToUse.split(',').map(c => c.trim()).filter(Boolean);
        if (parsedCats.length === 0) parsedCats.push("Pisteet");
        setCategories(parsedCats);

        const rawPlayers = inputToUse.split(',').map(s => s.trim()).filter(Boolean);
        
        let parsed = rawPlayers.map(p => {
          const parts = p.split(' ').filter(Boolean);
          const lastName = parts[0] || '';
          const firstName = parts.slice(1).join(' ') || '';
          return { id: generateId(), original: p, firstName, lastName };
        });

        const byFirstName = {};
        parsed.forEach(p => {
          const key = p.firstName || p.lastName;
          if (!byFirstName[key]) byFirstName[key] = [];
          byFirstName[key].push(p);
        });

        parsed = parsed.map(p => {
          const key = p.firstName || p.lastName;
          const group = byFirstName[key];
          if (group.length === 1) return { ...p, displayName: key };
          let prefixLen = 1;
          let unique = false;
          let dName = "";
          const lastNameToUse = p.firstName ? p.lastName : ""; 
          if (!lastNameToUse) {
            const idx = group.findIndex(x => x.id === p.id);
            return { ...p, displayName: `${key} ${idx + 1}` };
          }
          while (!unique && prefixLen <= lastNameToUse.length) {
            dName = `${key} ${lastNameToUse.substring(0, prefixLen)}.`;
            const conflicts = group.filter(other => {
              if (other.id === p.id) return false;
              const otherLastName = other.firstName ? other.lastName : "";
              const otherName = `${key} ${otherLastName.substring(0, prefixLen)}.`;
              return otherName === dName;
            });
            if (conflicts.length === 0) unique = true;
            else prefixLen++;
          }
          if (!unique) {
            const idx = group.findIndex(x => x.id === p.id);
            dName = `${key} ${lastNameToUse} (${idx + 1})`;
          }
          return { ...p, displayName: dName };
        });

        setPlayers(parsed);
      };

      const activeMatch = matches.find(m => m.id === activeMatchId);

      const updateScore = (playerId, category, delta) => {
        prepareAnimation();
        setMatches(prev => prev.map(m => {
          if (m.id === activeMatchId) {
            const currentScores = m.scores[playerId] || {};
            const currentValue = currentScores[category] || 0;
            const newValue = Math.max(0, currentValue + delta); 
            return {
              ...m,
              scores: { ...m.scores, [playerId]: { ...currentScores, [category]: newValue } }
            };
          }
          return m;
        }));
      };

      const updateAllScores = (playerId, newScoresObj, playerComment) => {
        prepareAnimation();
        setMatches(prev => prev.map(m => {
          if (m.id === activeMatchId) {
            const currentScores = m.scores[playerId] || {};
            const updatedScores = { ...currentScores };
            Object.entries(newScoresObj).forEach(([cat, val]) => {
              updatedScores[cat] = Math.max(0, parseInt(val) || 0);
            });
            updatedScores.playerComment = playerComment;
            return {
              ...m,
              scores: { ...m.scores, [playerId]: updatedScores }
            };
          }
          return m;
        }));
      };

      const openEditModal = (playerId) => {
        const playerScores = activeMatch?.scores[playerId] || {};
        const initialScores = {};
        categories.forEach(cat => {
          initialScores[cat] = playerScores[cat] || 0;
        });
        setEditModal({ 
          isOpen: true, 
          playerId, 
          scores: initialScores,
          playerComment: playerScores.playerComment || ""
        });
      };

      const createNewMatch = () => {
        prepareAnimation();
        const newId = matches.length > 0 ? Math.max(...matches.map(m => m.id)) + 1 : 1;
        const newMatch = { id: newId, name: `Ottelu ${newId}`, scores: {}, comments: "" };
        setMatches([...matches, newMatch]);
        setActiveMatchId(newId);
      };

      const saveMatchModal = () => {
        setMatches(prev => prev.map(m => 
          m.id === matchModal.matchId 
            ? { ...m, name: matchModal.name.trim() || "Nimetön ottelu", comments: matchModal.comments } 
            : m
        ));
        setMatchModal({ isOpen: false, matchId: null, name: "", comments: "" });
      };

      const deleteMatchModal = () => {
        if (matches.length <= 1) {
          const newId = 1;
          setMatches([{ id: newId, name: "Ottelu 1", scores: {}, comments: "" }]);
          setActiveMatchId(newId);
        } else {
          const newMatches = matches.filter(m => m.id !== matchModal.matchId);
          setMatches(newMatches);
          if (activeMatchId === matchModal.matchId) {
            setActiveMatchId(newMatches[0].id);
          }
        }
        setMatchModal({ isOpen: false, matchId: null, name: "", comments: "" });
      };

      const handleResetApp = () => {
        setPlayers([]);
        setMatches([{ id: 1, name: "Ottelu 1", scores: {}, comments: "" }]);
        setActiveMatchId(1);
        setIsSummaryOpen(false);
        setIsResetModalOpen(false);
      };

      const getPlayerTotal = (scoresObj) => {
        if (!scoresObj) return 0;
        return categories.reduce((sum, cat) => sum + (scoresObj[cat] || 0), 0);
      };

      const sortPlayersFn = (a, b, scoresData, currentSortBy) => {
        const sA = scoresData[a.id] || {};
        const sB = scoresData[b.id] || {};
        if (currentSortBy !== 'total') {
          const valA = sA[currentSortBy] || 0;
          const valB = sB[currentSortBy] || 0;
          if (valA !== valB) return valB - valA;
        }
        const totalA = getPlayerTotal(sA);
        const totalB = getPlayerTotal(sB);
        if (totalA !== totalB) return totalB - totalA; 
        for (const cat of categories) {
          const valA = sA[cat] || 0;
          const valB = sB[cat] || 0;
          if (valA !== valB) return valB - valA;
        }
        return a.displayName.localeCompare(b.displayName); 
      };

      const sortedPlayers = useMemo(() => {
        if (!activeMatch) return [];
        return [...players].sort((a, b) => sortPlayersFn(a, b, activeMatch.scores, sortBy));
      }, [players, activeMatch, categories, sortBy]);

      const { containerRef, prepareAnimation } = useFlipAnimation(sortedPlayers);

      const allTimeScores = useMemo(() => {
        const combined = {};
        matches.forEach(m => {
          Object.entries(m.scores).forEach(([playerId, matchScores]) => {
            if (!combined[playerId]) combined[playerId] = { _comments: [] };
            if (!combined[playerId]._comments) combined[playerId]._comments = [];
            
            categories.forEach(cat => {
              combined[playerId][cat] = (combined[playerId][cat] || 0) + (matchScores[cat] || 0);
            });

            if (matchScores.playerComment && matchScores.playerComment.trim() !== "") {
              combined[playerId]._comments.push(`${m.name}: ${matchScores.playerComment}`);
            }
          });
        });
        
        Object.keys(combined).forEach(playerId => {
          if (combined[playerId]._comments && combined[playerId]._comments.length > 0) {
            combined[playerId].playerComment = combined[playerId]._comments.join(' | ');
          }
          delete combined[playerId]._comments;
        });

        return combined;
      }, [matches, categories]);

      const exportToCSV = () => {
        let csvContent = "";
        const separator = ";"; 
        
        matches.forEach(m => {
          csvContent += `"${m.name}"\n`;
          if (m.comments && m.comments.trim() !== "") {
            csvContent += `"Muistiinpanot: ${m.comments.replace(/"/g, '""')}"\n`;
          }
          csvContent += `Sijoitus${separator}Pelaaja${separator}${categories.map(c => `"${c}"`).join(separator)}${separator}Yhteensä${separator}Kommentti\n`;

          const matchPlayers = [...players].sort((a,b) => sortPlayersFn(a, b, m.scores, 'total'));

          matchPlayers.forEach((p, idx) => {
            const s = m.scores[p.id] || {};
            const row = [
              idx + 1,
              `"${p.displayName}"`,
              ...categories.map(cat => s[cat] || 0),
              getPlayerTotal(s),
              `"${s.playerComment || ''}"`
            ];
            csvContent += row.join(separator) + '\n';
          });
          csvContent += '\n'; 
        });

        csvContent += `"Kaikki ottelut (YHTEENVETO)"\n`;
        csvContent += `Sijoitus${separator}Pelaaja${separator}${categories.map(c => `"${c}"`).join(separator)}${separator}Yhteensä${separator}Kommentti\n`;

        const summaryPlayers = [...players].sort((a,b) => sortPlayersFn(a, b, allTimeScores, 'total'));
        
        summaryPlayers.forEach((p, idx) => {
          const s = allTimeScores[p.id] || {};
          const row = [
            idx + 1,
            `"${p.displayName}"`,
            ...categories.map(cat => s[cat] || 0),
            getPlayerTotal(s),
            `"${s.playerComment || ''}"`
          ];
          csvContent += row.join(separator) + '\n';
        });

        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `Pistetilastot.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      if (players.length === 0) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="bg-white max-w-lg w-full rounded-3xl shadow-xl p-6 sm:p-8">
              <div className="flex justify-center mb-6 h-16 sm:h-20">
                {!logoError ? (
                  <img src={LOGO} alt="FC Kasiysi" className="h-full object-contain drop-shadow-md" onError={() => setLogoError(true)} />
                ) : (
                  <div className="bg-green-100 p-4 rounded-full text-kasiysi-green flex items-center justify-center">
                    <Icon name="Trophy" size={48} />
                  </div>
                )}
              </div>
              <h1 className="text-4xl font-bebas text-center text-slate-800 tracking-wide mb-6">Pistelaskuri</h1>
              <div className="space-y-4 mb-8">
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <Icon name="Users" size={18} className="text-kasiysi-green" /> Pelaajat (Sukunimi Etunimi, ...)
                  </label>
                  <textarea
                    className="w-full h-32 border-2 border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-kasiysi-green/20 focus:border-kasiysi-green outline-none resize-none text-sm font-medium transition-all"
                    placeholder={DEFAULT_PLAYERS}
                    value={rawInput}
                    onChange={(e) => setRawInput(e.target.value)}
                  />
                </div>
                <div>
                  <label className="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                    <Icon name="Settings" size={18} className="text-kasiysi-green" /> Pistetyypit (pilkulla erotettuna)
                  </label>
                  <input
                    type="text"
                    className="w-full border-2 border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-kasiysi-green/20 focus:border-kasiysi-green outline-none text-sm font-bold text-slate-700 transition-all"
                    value={rawCategories}
                    onChange={(e) => setRawCategories(e.target.value)}
                    placeholder="Ryöstö, Syöttö, Maali"
                  />
                  <p className="text-xs text-slate-500 mt-2 ml-1">Kategoriat näytetään yllä olevassa järjestyksessä. Sama järjestys ratkaisee sijoituksen tasatilanteessa.</p>
                </div>
              </div>
              <button
                onClick={handleStart}
                className="w-full bg-kasiysi-green hover:bg-[#008f44] text-white font-bebas text-2xl tracking-wider py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-2 active:scale-[0.98]"
              >
                Aloita seuranta
              </button>
            </div>
            <div className="mt-8 text-slate-400 text-xs font-medium text-center">
              &copy; 2026 Versio {APP_VERSION}
            </div>
          </div>
        );
      }

      const SummaryModal = () => {
        const dataToUse = summaryTab === 'all' ? allTimeScores : (matches.find(m => m.id === summaryTab)?.scores || {});
        let playersToUse = summaryTab === 'all' 
          ? [...players].sort((a,b) => sortPlayersFn(a, b, allTimeScores, sortBy))
          : [...players].sort((a,b) => sortPlayersFn(a, b, dataToUse, sortBy));
        if (hideZeroScores) {
          playersToUse = playersToUse.filter(p => getPlayerTotal(dataToUse[p.id] || {}) > 0);
        }
        return (
          <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4">
            <div className="bg-white w-full max-w-4xl max-h-[95vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
              <div className="p-4 sm:p-5 border-b border-slate-100 bg-slate-50 flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4">
                <div className="flex justify-between items-center w-full sm:w-auto">
                  <h2 className="text-3xl font-bebas tracking-wide text-kasiysi-green flex items-center gap-2">
                    <Icon name="BarChart3" className="text-kasiysi-green" />
                    Yhteenveto
                  </h2>
                  <button onClick={() => setIsSummaryOpen(false)} className="sm:hidden p-2 hover:bg-slate-200 rounded-full text-slate-500 transition-colors -mr-2">
                    <Icon name="X" size={24} />
                  </button>
                </div>
                <div className="flex items-center gap-2 flex-wrap sm:flex-nowrap justify-end w-full sm:w-auto">
                  <button onClick={() => setHideZeroScores(!hideZeroScores)} className={`flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-2.5 sm:py-2 font-bold rounded-xl transition-colors text-xs sm:text-sm flex-1 sm:flex-none whitespace-nowrap ${hideZeroScores ? 'bg-kasiysi-green text-white' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>
                    <Icon name="Filter" size={16} /> {hideZeroScores ? 'Kaikki pelaajat' : 'Vain pisteitä saaneet'}
                  </button>
                  <button onClick={exportToCSV} className="flex items-center justify-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-2.5 sm:py-2 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-colors text-xs sm:text-sm flex-1 sm:flex-none whitespace-nowrap">
                    <Icon name="Download" size={16} /> Lataa Kaikki (CSV)
                  </button>
                  <button onClick={() => setIsSummaryOpen(false)} className="hidden sm:block p-2 hover:bg-slate-200 rounded-full text-slate-500 transition-colors ml-1">
                    <Icon name="X" size={24} />
                  </button>
                </div>
              </div>
              <div className="flex flex-wrap border-b border-slate-200">
                <button className={`flex-none px-6 py-4 text-sm font-bold transition-colors uppercase tracking-wider ${summaryTab === 'all' ? 'border-b-4 border-kasiysi-green text-kasiysi-green bg-green-50/50' : 'text-slate-500 hover:bg-slate-50'}`} onClick={() => setSummaryTab('all')}>Kaikki (Yhteensä)</button>
                {matches.map(m => (
                  <button key={m.id} className={`flex-none px-6 py-4 text-sm font-bold transition-colors uppercase tracking-wider ${summaryTab === m.id ? 'border-b-4 border-kasiysi-green text-kasiysi-green bg-green-50/50' : 'text-slate-500 hover:bg-slate-50'}`} onClick={() => setSummaryTab(m.id)}>{m.name}</button>
                ))}
              </div>
              <div className="overflow-auto p-4 flex-1">
                {summaryTab !== 'all' && matches.find(m => m.id === summaryTab)?.comments?.trim() && (
                  <div className="mb-4 p-3 sm:p-4 bg-yellow-50/50 border border-yellow-200/50 rounded-xl text-sm text-slate-700">
                    <strong className="block text-xs uppercase tracking-wider text-yellow-700/70 mb-1">Ottelun muistiinpanot</strong>
                    <div className="whitespace-pre-wrap font-medium">{matches.find(m => m.id === summaryTab).comments}</div>
                  </div>
                )}
                {summaryTab === 'all' && matches.some(m => m.comments?.trim()) && (
                  <div className="mb-4 p-3 sm:p-4 bg-yellow-50/50 border border-yellow-200/50 rounded-xl text-sm text-slate-700">
                    <strong className="block text-xs uppercase tracking-wider text-yellow-700/70 mb-2">Otteluiden muistiinpanot</strong>
                    <div className="space-y-2">
                      {matches.filter(m => m.comments?.trim()).map(m => (
                        <div key={m.id} className="font-medium">
                          <span className="font-bold text-slate-800 mr-2">{m.name}:</span> 
                          <span className="whitespace-pre-wrap">{m.comments}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <table className="w-full text-left border-collapse min-w-[400px]">
                  <thead>
                    <tr className="border-b-2 border-slate-200 text-slate-400 text-xs sm:text-sm uppercase tracking-wider">
                      <th className="pb-3 font-bold w-10">#</th>
                      <th className="pb-3 font-bold min-w-[120px]">Pelaaja</th>
                      {categories.map(cat => (
                        <th key={cat} className={`pb-3 font-bold text-center w-12 sm:w-16 ${sortBy === cat ? 'text-kasiysi-green' : ''}`} title={cat}>
                          <span className="hidden sm:inline">{cat.substring(0,3)}</span>
                          <span className="sm:hidden">{cat.substring(0,1)}</span>
                        </th>
                      ))}
                      <th className={`pb-3 font-black text-center w-16 ${sortBy === 'total' ? 'text-kasiysi-green' : ''}`}>YHT</th>
                    </tr>
                  </thead>
                  <tbody>
                    {playersToUse.map((player, idx) => {
                      const s = dataToUse[player.id] || {};
                      const total = getPlayerTotal(s);
                      return (
                        <tr key={player.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                          <td className="py-3 sm:py-4 text-slate-400 font-bold text-sm">{idx + 1}.</td>
                          <td className="py-3 sm:py-4 font-black text-slate-700 text-sm">
                            <div className="flex flex-col">
                              <span>{player.displayName}</span>
                              {s.playerComment && (
                                <span className="text-[10px] text-slate-400 italic font-medium truncate max-w-[150px]" title={s.playerComment}>
                                  {s.playerComment}
                                </span>
                              )}
                            </div>
                          </td>
                          {categories.map(cat => (
                            <td key={cat} className={`py-3 sm:py-4 text-center text-sm ${sortBy === cat ? 'font-black text-kasiysi-green' : 'font-bold text-slate-600'}`}>{s[cat] || 0}</td>
                          ))}
                          <td className={`py-3 sm:py-4 text-center font-black text-base ${sortBy === 'total' ? 'text-kasiysi-green' : 'text-slate-700'}`}>{total}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-100 pb-28">
          <div className="bg-white shadow-sm sticky top-0 z-10 border-b border-slate-200">
            <div className="max-w-4xl mx-auto px-2 sm:px-4 py-2 sm:py-3 flex items-center justify-between">
              <div className="w-24 sm:w-32">
                <button onClick={() => setIsResetModalOpen(true)} className="p-2 sm:px-3 sm:py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl transition-colors flex items-center gap-2 font-bold text-sm w-fit" title="Palaa alkuun"><Icon name="Home" size={18} /><span className="hidden sm:inline">Alkuun</span></button>
              </div>
              <div className="flex-1 flex justify-center items-center">
                {!logoError ? <img src={LOGO} alt="FC Kasiysi" className="h-8 sm:h-10 object-contain" onError={() => setLogoError(true)} /> : <Icon name="Trophy" className="text-kasiysi-green" size={28} />}
              </div>
              <div className="w-24 sm:w-32 flex justify-end">
                <button onClick={() => setIsHelpModalOpen(true)} className="px-3 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl transition-colors flex items-center gap-2 font-bold text-sm w-fit" title="Ohje"><Icon name="Info" size={18} /><span>Ohje</span></button>
              </div>
            </div>
            <div className="border-t border-slate-100 bg-slate-50/50">
              <div className="max-w-4xl mx-auto px-2 sm:px-4 py-2.5 flex gap-2 flex-wrap items-center">
                {matches.map(m => (
                  <button key={m.id} onClick={() => { if (activeMatchId === m.id) { setMatchModal({ isOpen: true, matchId: m.id, name: m.name, comments: m.comments || "" }); } else { prepareAnimation(); setActiveMatchId(m.id); } }} className={`whitespace-nowrap px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-xs sm:text-sm font-bold uppercase tracking-wider transition-all flex items-center gap-1.5 ${activeMatchId === m.id ? 'bg-kasiysi-green text-white shadow-md' : 'bg-white text-slate-600 hover:bg-slate-200 border border-slate-200'}`}>{m.name}{activeMatchId === m.id && <Icon name="Edit" size={14} className="opacity-80" />}</button>
                ))}
                <button onClick={createNewMatch} className="whitespace-nowrap px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-xs sm:text-sm font-bold uppercase tracking-wider text-kasiysi-green bg-green-100 hover:bg-green-200 flex items-center gap-1 transition-colors ml-1"><Icon name="PlusCircle" size={16} /><span className="hidden sm:inline">Uusi ottelu</span></button>
              </div>
            </div>
          </div>
          <div className="max-w-4xl mx-auto px-2 sm:px-4 mt-4 flex items-center gap-2 overflow-x-auto scrollbar-hide">
            <span className="text-slate-500 flex items-center flex-shrink-0 mr-1" title="Järjestä"><Icon name="ArrowDownWideNarrow" size={24} /></span>
            <button onClick={() => { prepareAnimation(); setSortBy('total'); }} className={`px-3 py-1.5 rounded-lg text-xs sm:text-sm font-bold uppercase transition-colors whitespace-nowrap flex-shrink-0 border-2 ${sortBy === 'total' ? 'bg-kasiysi-green text-white border-kasiysi-green shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>Yhteensä</button>
            {categories.map(cat => (
              <button key={cat} onClick={() => { prepareAnimation(); setSortBy(cat); }} className={`px-3 py-1.5 rounded-lg text-xs sm:text-sm font-bold uppercase transition-colors whitespace-nowrap flex-shrink-0 border-2 ${sortBy === cat ? 'bg-kasiysi-green text-white border-kasiysi-green shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>{cat}</button>
            ))}
          </div>
          <div ref={containerRef} className="relative max-w-4xl mx-auto px-2 sm:px-4 py-3 sm:py-4 flex flex-col gap-2.5">
            {sortedPlayers.map((player, index) => {
              const scores = activeMatch?.scores[player.id] || {};
              const total = getPlayerTotal(scores);
              return (
                <div key={player.id} data-id={player.id} className="bg-white p-2 sm:p-3 rounded-2xl shadow-sm border border-slate-200 flex items-stretch gap-2 sm:gap-4 overflow-hidden hover:border-slate-300 transition-colors relative">
                  <div className="flex items-center gap-2 min-w-[100px] w-1/4 max-w-[150px] sm:min-w-[160px] flex-shrink-0">
                    <div className={`w-8 h-8 sm:w-10 sm:h-10 flex-shrink-0 rounded-full flex items-center justify-center font-black text-sm sm:text-base ${index === 0 && (sortBy === 'total' ? total > 0 : (scores[sortBy] || 0) > 0) ? 'bg-yellow-100 text-yellow-700' : index === 1 && (sortBy === 'total' ? total > 0 : (scores[sortBy] || 0) > 0) ? 'bg-slate-200 text-slate-700' : index === 2 && (sortBy === 'total' ? total > 0 : (scores[sortBy] || 0) > 0) ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}`}>{index + 1}</div>
                    <button onClick={() => openEditModal(player.id)} className="text-sm sm:text-base font-bold text-slate-800 truncate text-left hover:text-kasiysi-green hover:underline transition-colors focus:outline-none flex flex-col" title="Muokkaa pisteitä">
                      <span>{player.displayName}</span>
                      {scores.playerComment && <span className="text-[10px] text-slate-400 italic font-medium truncate w-full text-left">{scores.playerComment}</span>}
                    </button>
                  </div>
                  <div className="flex items-stretch gap-1.5 sm:gap-2 overflow-x-auto flex-grow scrollbar-hide">
                    {categories.map((cat, i) => {
                      const color = catColors[i % catColors.length];
                      const val = scores[cat] || 0;
                      const isSortedByThis = sortBy === cat;
                      return (
                        <button key={cat} onClick={() => updateScore(player.id, cat, 1)} className={`flex-1 flex flex-col sm:flex-row items-center justify-center sm:justify-between ${color.bg} border-2 ${isSortedByThis ? 'border-slate-800 shadow-md' : color.border} rounded-xl px-2 py-2 sm:px-3 sm:py-2 min-w-[50px] sm:min-w-[70px] ${color.hover} transition-all cursor-pointer active:scale-95 select-none`} title={`Lisää ${cat}`}>
                          <span className={`text-[9px] sm:text-xs uppercase font-black ${isSortedByThis ? 'text-black' : color.text} truncate mb-0.5 sm:mb-0 sm:mr-2 opacity-80`}>{cat}</span>
                          <span className={`text-center font-black text-base sm:text-lg tabular-nums ${isSortedByThis ? 'text-black' : color.text} leading-none`}>{val}</span>
                        </button>
                      );
                    })}
                  </div>
                  <div className={`text-white font-bebas px-3 py-2 sm:px-5 sm:py-2 rounded-xl text-xl sm:text-3xl tabular-nums flex-shrink-0 text-center min-w-[45px] sm:min-w-[65px] flex items-center justify-center transition-all border-2 bg-kasiysi-green pt-3 ${sortBy === 'total' ? 'border-black shadow-md scale-105' : 'border-transparent opacity-90'}`}>{total}</div>
                </div>
              );
            })}
          </div>
          <div className="max-w-4xl mx-auto px-4 py-8 text-center text-slate-400 text-xs font-medium pb-12">&copy; 2026 Versio {APP_VERSION}</div>
          <div className="fixed bottom-6 left-0 right-0 px-4 pointer-events-none flex justify-center z-20">
            <button onClick={() => setIsSummaryOpen(true)} className="pointer-events-auto bg-kasiysi-green text-white px-6 sm:px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 sm:gap-3 hover:bg-[#008f44] hover:scale-105 transition-all transform text-sm sm:text-base border-4 border-green-800/20"><Icon name="Eye" size={20} className="sm:w-6 sm:h-6" /><span className="hidden sm:inline uppercase tracking-widest">Avaa yhteenveto</span><span className="sm:hidden uppercase tracking-wider">Yhteenveto</span></button>
          </div>
          {isSummaryOpen && <SummaryModal />}
          {matchModal.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl">
                <h3 className="font-bold text-sm text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2"><Icon name="Settings" size={16} /> Ottelun tiedot</h3>
                <div className="space-y-4 mb-8">
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">Ottelun nimi</label>
                    <input type="text" className="w-full border-2 border-slate-200 rounded-xl p-3 focus:border-kasiysi-green outline-none font-bold text-slate-800 transition-colors" value={matchModal.name} onChange={e => setMatchModal({...matchModal, name: e.target.value})} placeholder="Esim. Alkusarja peli 1" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-slate-700 mb-2">Kommentit / Muistiinpanot</label>
                    <textarea className="w-full h-24 border-2 border-slate-200 rounded-xl p-3 focus:border-kasiysi-green outline-none text-sm text-slate-800 resize-none transition-colors" value={matchModal.comments} onChange={e => setMatchModal({...matchModal, comments: e.target.value})} placeholder="Kirjaa ylös tärkeitä huomioita pelistä..." />
                  </div>
                </div>
                <div className="flex flex-col gap-3">
                  <div className="flex justify-end gap-3 w-full">
                    <button onClick={() => setMatchModal({ isOpen: false, matchId: null, name: "", comments: "" })} className="px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors flex-1">Peruuta</button>
                    <button onClick={saveMatchModal} className="px-4 py-3 bg-kasiysi-green hover:bg-[#008f44] text-white font-bold rounded-xl transition-colors flex-1">Tallenna</button>
                  </div>
                  <button onClick={deleteMatchModal} className="mt-2 px-4 py-3 bg-red-50 hover:bg-red-100 text-red-600 font-bold rounded-xl transition-colors flex items-center justify-center gap-2"><Icon name="Trash" size={18} />Poista ottelu</button>
                </div>
              </div>
            </div>
          )}
          {isResetModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl text-center">
                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="AlertTriangle" size={32} /></div>
                <h3 className="font-bebas tracking-wide text-3xl text-slate-800 mb-2">Palaa alkuun?</h3>
                <p className="text-slate-600 font-medium mb-8">Kaikki nykyiset pelaajat, pisteet ja ottelut poistetaan. Haluatko varmasti jatkaa?</p>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setIsResetModalOpen(false)} className="px-5 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl flex-1 transition-colors">Peruuta</button>
                  <button onClick={handleResetApp} className="px-5 py-3.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-2xl flex-1 transition-colors">Kyllä, poista</button>
                </div>
              </div>
            </div>
          )}
          {isHelpModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="font-bebas tracking-wide text-3xl text-slate-800 flex items-center gap-2"><Icon name="Info" className="text-kasiysi-green" /> Käyttöohje</h3>
                  <button onClick={() => setIsHelpModalOpen(false)} className="p-2 hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><Icon name="X" size={24} /></button>
                </div>
                <div className="overflow-y-auto pr-2 space-y-4 text-slate-600 text-sm sm:text-base font-medium">
                  <p><strong className="text-slate-800">Pisteiden lisääminen:</strong> Paina suoraan haluttua kategoriaa pelaajan rivillä antaaksesi yhden pisteen nopeasti.</p>
                  <p><strong className="text-slate-800">Pelaajan muokkaus ja kommentit:</strong> Paina pelaajan nimeä avataksesi valikon. Täällä voit vähentää tai muokata pisteitä vapaasti, sekä lisätä pelaajalle kyseistä ottelua koskevan muistiinpanon tai palautteen.</p>
                  <p><strong className="text-slate-800">Otteluiden hallinta:</strong> Luo uusi peli "Uusi ottelu" -napista. Painamalla aktiivisen ottelun nimeä (kynä-ikoni) pääset muuttamaan sen nimeä, kirjaamaan koko ottelun yleisiä muistiinpanoja tai poistamaan ottelun.</p>
                  <p><strong className="text-slate-800">Järjestäminen:</strong> Paina lajittelurivin painikkeita (Yhteensä tai tietty kategoria) lajitellaksesi pelaajat haluttuun järjestykseen.</p>
                  <p><strong className="text-slate-800">Yhteenveto ja lataus:</strong> Alareunan napista näet kaikkien otteluiden yhteistilastot ja kootut kommentit. Voit suodattaa nollatulokset piiloon ja ladata kaiken laitteellesi CSV-tiedostona (yhteensopiva Excelin/Sheetsin kanssa).</p>
                  <p><strong className="text-slate-800">Tallennus:</strong> Tiedot tallentuvat selaimeesi automaattisesti. "Alkuun" -painike (vasemmalla ylhäällä) poistaa kaikki tiedot pysyvästi ja palauttaa ohjelman alkutilaan.</p>
                </div>
                <div className="mt-8 pt-4 border-t border-slate-100 flex justify-end">
                  <button onClick={() => setIsHelpModalOpen(false)} className="px-6 py-3 bg-kasiysi-green hover:bg-[#008f44] text-white font-bold rounded-2xl transition-colors w-full sm:w-auto">Selvä!</button>
                </div>
              </div>
            </div>
          )}
          {editModal.isOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-sm shadow-2xl">
                <h3 className="font-bold text-sm text-slate-400 uppercase tracking-wider mb-1">Muokkaa pelaajaa</h3>
                <p className="font-black text-2xl sm:text-3xl text-slate-800 mb-6 pb-4 border-b-2 border-slate-100 break-words">{players.find(p => p.id === editModal.playerId)?.original}</p>
                <div className="space-y-4 mb-8 max-h-[60vh] overflow-y-auto pr-2 scrollbar-hide">
                  <div className="space-y-3">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">Pisteet</label>
                    {categories.map(cat => (
                      <div key={cat} className="flex items-center justify-between bg-slate-50 p-2 sm:p-3 rounded-2xl border border-slate-100">
                        <label className="text-sm sm:text-base font-bold text-slate-700 uppercase truncate pr-2 flex-1">{cat}</label>
                        <div className="flex items-center gap-2">
                          <button onClick={() => setEditModal(prev => ({ ...prev, scores: { ...prev.scores, [cat]: Math.max(0, (parseInt(prev.scores[cat]) || 0) - 1) } }))} className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-xl text-slate-600 hover:bg-slate-100 hover:border-slate-300 transition-colors focus:outline-none active:scale-95"><Icon name="Minus" size={20} /></button>
                          <input type="number" min="0" className="w-16 h-10 sm:w-20 sm:h-12 border-2 border-slate-200 rounded-xl focus:border-kasiysi-green outline-none text-center font-black text-xl text-slate-800 bg-white" value={editModal.scores[cat]} onChange={e => setEditModal({ ...editModal, scores: { ...editModal.scores, [cat]: e.target.value } })} />
                          <button onClick={() => setEditModal(prev => ({ ...prev, scores: { ...prev.scores, [cat]: (parseInt(prev.scores[cat]) || 0) + 1 } }))} className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-white border-2 border-slate-200 rounded-xl text-slate-600 hover:bg-slate-100 hover:border-slate-300 transition-colors focus:outline-none active:scale-95"><Icon name="Plus" size={20} /></button>
                        </div>
                      </div>
                    ))}
                  </div>
                  
                  <div className="space-y-2 mt-4">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="MessageSquare" size={14} /> Pelaajan kommentti</label>
                    <textarea className="w-full h-20 border-2 border-slate-200 rounded-xl p-3 focus:border-kasiysi-green outline-none text-sm text-slate-800 resize-none bg-slate-50 transition-colors" value={editModal.playerComment || ""} onChange={e => setEditModal({...editModal, playerComment: e.target.value})} placeholder="Esim. Loistava asenne."></textarea>
                  </div>
                  
                </div>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setEditModal({ isOpen: false, playerId: null, scores: {}, playerComment: "" })} className="px-5 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl transition-colors w-full sm:w-auto">Peruuta</button>
                  <button onClick={() => { updateAllScores(editModal.playerId, editModal.scores, editModal.playerComment); setEditModal({ isOpen: false, playerId: null, scores: {}, playerComment: "" }); }} className="px-5 py-3.5 bg-kasiysi-green hover:bg-[#008f44] text-white font-bold rounded-2xl transition-colors w-full sm:w-auto">Tallenna</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
